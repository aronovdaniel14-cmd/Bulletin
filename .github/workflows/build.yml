name: "FAP: Daily Build Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ufbt-build:
    runs-on: ubuntu-latest
    name: "Build Flipper App"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        id: build-app
        with:
          sdk-channel: release

      - name: Rename FAP
        run: |
          mkdir release
          DATE=$(date +'%Y-%m-%d')
          cp "${{ steps.build-app.outputs.fap-artifacts }}" "release/bulletin-$DATE.fap"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bulletin-build
          path: release/*.fap

      - name: Create or Update Daily Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily
          name: Daily Build
          body: |
            Automatically generated Flipper Zero app build.
            Updated: ${{ github.event.head_commit.timestamp }}
          files: release/*.fap
